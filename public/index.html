<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Price Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Smart Product Price Match</h1>
            <p>Find the best deals across Amazon, Flipkart, and more.</p>
        </header>

        <div class="search-container">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Search for a product (e.g., iPhone 15)..." required
                    autocomplete="off">
                <button type="submit" id="search-btn" aria-label="Search">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Scanning the web for the best prices...</p>
        </div>

        <div id="results-container" class="hidden">
            <div class="results-header">
                <h2>Best Deals Found</h2>
                <span id="result-count"></span>
            </div>

            <div class="comparison-grid" id="comparison-grid">
                <!-- Results will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
